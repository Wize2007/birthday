<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday!</title>
    <style>
      :root {
        --bg: #fff2f7;
        --card: #ffffff;
        --text: #5b2a86;
        --accent: #ff6b9a;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, var(--bg), #ffe6ef);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        background: var(--card);
        border-radius: 24px;
        box-shadow: 0 20px 45px rgba(91, 42, 134, 0.15);
        max-width: 680px;
        width: 100%;
        padding: 36px;
        text-align: center;
      }

      .cake {
        font-size: 4rem;
        margin-bottom: 8px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.8rem);
      }

      p {
        font-size: 1.1rem;
        line-height: 1.7;
        margin: 0 0 16px;
      }

      .pill {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 16px;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        font-weight: bold;
        letter-spacing: 0.03em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="cake">🎂</div>
      <h1>Happy Birthday!</h1>
      <p>Wishing you a wonderful day filled with joy, laughter, and all the things that make you smile.</p>
      <p>May this year bring you exciting adventures, beautiful memories, and plenty of reasons to celebrate.</p>
      <span class="pill">You are amazing!</span>
    </main>
  </body>
</html>
